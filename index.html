<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PrincipalED Comment Studio</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0b0d14; font-family: 'DM Sans', sans-serif; color: #e8e8e8; }
  .card { background:#141720; border:1px solid #23263a; border-radius:14px; padding:20px; margin-bottom:14px; transition:border-color .2s; }
  .card.approved { border-color:#2d6b3f !important; background:#111c16; }
  .card.posted   { border-color:#1B3A6B !important; background:#0f1420; opacity:.6; }
  .btn { border:none; border-radius:8px; padding:8px 16px; font-size:13px; font-weight:600; cursor:pointer; transition:all .15s; font-family:'DM Sans',sans-serif; letter-spacing:.3px; display:inline-flex; align-items:center; gap:6px; white-space:nowrap; }
  .btn:disabled { opacity:.35; cursor:not-allowed; }
  .btn-gold  { background:#C9973A; color:#0b0d14; }
  .btn-gold:hover:not(:disabled)  { background:#daa840; transform:translateY(-1px); }
  .btn-navy  { background:#1B3A6B; color:#fff; }
  .btn-navy:hover:not(:disabled)  { background:#234a85; }
  .btn-green { background:#2d6b3f; color:#fff; }
  .btn-green:hover:not(:disabled) { background:#38844e; }
  .btn-ghost { background:transparent; color:#666; border:1px solid #23263a; }
  .btn-ghost:hover:not(:disabled) { border-color:#555; color:#ccc; }
  .btn-red   { background:transparent; color:#e05c5c; border:1px solid #3a1a1a; font-size:12px; }
  .btn-scan  { background:linear-gradient(135deg,#1B3A6B,#2D6FAB); color:#fff; }
  .btn-scan:hover:not(:disabled)  { background:linear-gradient(135deg,#234a85,#3680c0); }
  .mode-card { border-radius:12px; padding:18px; cursor:pointer; transition:all .2s; border:2px solid transparent; }
  .mode-card.active { border-color:#C9973A; background:#1a1a0a; }
  .mode-card:not(.active) { background:#141720; border-color:#23263a; }
  .tab { padding:10px 20px; background:transparent; border:none; border-bottom:2px solid transparent; color:#555; font-size:14px; font-weight:500; cursor:pointer; font-family:'DM Sans',sans-serif; transition:all .15s; }
  .tab.active { color:#C9973A; border-bottom-color:#C9973A; }
  .input { background:#0b0d14; border:1px solid #23263a; border-radius:8px; padding:10px 14px; color:#e8e8e8; font-size:14px; font-family:'DM Sans',sans-serif; outline:none; width:100%; transition:border-color .2s; }
  .input:focus { border-color:#C9973A; }
  .reply-box { background:#0b0d14; border:1px solid #23263a; border-radius:10px; padding:14px; margin-top:12px; font-size:14px; line-height:1.65; color:#bbb; }
  textarea.reply-edit { width:100%; background:#0b0d14; border:1px solid #C9973A; border-radius:10px; padding:14px; font-size:14px; line-height:1.65; color:#e8e8e8; font-family:'DM Sans',sans-serif; resize:vertical; min-height:90px; margin-top:12px; outline:none; }
  .avatar { width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; flex-shrink:0; background:linear-gradient(135deg,#1B3A6B,#2D6FAB); color:#fff; }
  .badge { display:inline-block; padding:2px 9px; border-radius:20px; font-size:11px; font-weight:600; }
  .progress-bar-track { background:#23263a; border-radius:99px; height:6px; overflow:hidden; margin-top:8px; }
  .progress-bar-fill  { background:linear-gradient(90deg,#C9973A,#daa840); height:100%; border-radius:99px; transition:width .3s; }
  .spinner { width:13px; height:13px; border:2px solid rgba(201,151,58,.3); border-top-color:#C9973A; border-radius:50%; animation:spin .7s linear infinite; flex-shrink:0; display:inline-block; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .pulse { animation:pulse 1.5s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.45} }
  .toast { position:fixed; bottom:24px; right:24px; border-radius:10px; padding:12px 18px; font-size:13px; font-weight:500; z-index:9999; animation:slideUp .25s ease; max-width:340px; }
  .toast.success { background:#141720; border:1px solid #C9973A; color:#C9973A; }
  .toast.error   { background:#1a0808; border:1px solid #e05c5c; color:#e05c5c; }
  @keyframes slideUp { from{transform:translateY(14px);opacity:0} to{transform:translateY(0);opacity:1} }
  ::-webkit-scrollbar { width:5px; }
  ::-webkit-scrollbar-track { background:#0b0d14; }
  ::-webkit-scrollbar-thumb { background:#23263a; border-radius:3px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const BRAND_VOICE = `You are Dr. Gordon Amerson — a sitting school district superintendent, Gallup Certified Strengths Coach, and founder of PrincipalED Leader Academy. You speak directly, warmly, and with practitioner authority. You do NOT use hype. You speak to educators as a peer who has walked the path and now leads at the highest level.

Your audience: aspiring principals, assistant principals, and leadership-transitioning educators (60% female, ages 35-54).

Your product ecosystem:
- FREE: Principal Interview Prep Checklist at principaledleader.com
- $47: Principal Interview Playbook (for candidates actively preparing)
- $497: Aspiring Principal Accelerator — 6-week live cohort, limited seats

COMMENT RESPONSE RULES:
1. Always acknowledge what they said specifically
2. Name their real problem if stuck (usually story/positioning, not experience)
3. Point to ONE resource — the right one for where they are
4. Close with energy and belief in them
5. Keep under 4 sentences for standard comments
6. NEVER offer free 1:1 mentorship. Redirect to products.
7. Sign off as: — Dr. Amerson (only for longer replies)
8. Tone: encouraging, direct, expert, practitioner-grounded. No hype.

CLASSIFY the commenter:
- ASPIRING: Just credentialed or early in journey → Free checklist CTA
- STUCK_AP: Has experience, been finalist, can't land the job → Accelerator CTA
- SOCIAL_PROOF: Got the job, celebrating → Amplify + celebrate
- GENERAL_PRAISE: Loves the content → Warm reply + soft checklist CTA
- MENTORSHIP_REQUEST: Asking for free mentorship → Redirect to ecosystem warmly
- CAPACITY: Current leader wanting to grow → Accelerator or future products

Respond ONLY in this exact format:
CATEGORY: [category]
REPLY: [reply text]`;

const CAT = {
  SOCIAL_PROOF:       { bg:"#1a3a25", border:"#2d6b3f", text:"#4ade80",  label:"🏆 Social Proof" },
  STUCK_AP:           { bg:"#3a2e10", border:"#856404", text:"#fbbf24",  label:"🎯 Stuck AP" },
  ASPIRING:           { bg:"#0f2a4a", border:"#1B3A6B", text:"#60a5fa",  label:"🌱 Aspiring" },
  GENERAL_PRAISE:     { bg:"#1e1e2e", border:"#3a3a5a", text:"#a0a0c0",  label:"💬 Praise" },
  MENTORSHIP_REQUEST: { bg:"#3a1a1a", border:"#7a2020", text:"#f87171",  label:"🤝 Mentorship Ask" },
  CAPACITY:           { bg:"#0f3030", border:"#0c5460", text:"#34d399",  label:"📈 Capacity" },
  UNKNOWN:            { bg:"#1a1d27", border:"#2a2d3a", text:"#888",     label:"❓ Other" }
};

const YT_SCOPE = "https://www.googleapis.com/auth/youtube.force-ssl";

function buildAuthUrl(clientId) {
  const redirectUri = window.location.origin + window.location.pathname;
  const params = new URLSearchParams({
    client_id: clientId, redirect_uri: redirectUri,
    response_type: "token", scope: YT_SCOPE,
    include_granted_scopes: "true", state: "yt_auth"
  });
  return `https://accounts.google.com/o/oauth2/v2/auth?${params}`;
}

function parseTokenFromHash() {
  const hash = window.location.hash.substring(1);
  const params = new URLSearchParams(hash);
  if (params.get("access_token") && params.get("state") === "yt_auth") {
    return { token: params.get("access_token"), expiresIn: parseInt(params.get("expires_in") || "3600") };
  }
  return null;
}

async function ytFetch(url, token, options = {}) {
  const res = await fetch(url, {
    ...options,
    headers: { Authorization: `Bearer ${token}`, "Content-Type": "application/json", ...(options.headers||{}) }
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err?.error?.message || `YouTube API error ${res.status}`);
  }
  return res.json();
}

async function fetchChannelInfo(token) {
  const data = await ytFetch("https://www.googleapis.com/youtube/v3/channels?part=snippet,contentDetails,statistics&mine=true", token);
  const ch = data.items?.[0];
  if (!ch) throw new Error("No channel found");
  return {
    id: ch.id, title: ch.snippet.title,
    videoCount: parseInt(ch.statistics?.videoCount || "0"),
    uploadsPlaylistId: ch.contentDetails.relatedPlaylists.uploads
  };
}

async function fetchVideoIds(token, uploadsPlaylistId, maxVideos, onProgress) {
  const videoIds = [];
  let pageToken = null;
  do {
    const url = new URL("https://www.googleapis.com/youtube/v3/playlistItems");
    url.searchParams.set("part", "snippet");
    url.searchParams.set("playlistId", uploadsPlaylistId);
    url.searchParams.set("maxResults", "50");
    if (pageToken) url.searchParams.set("pageToken", pageToken);
    const data = await ytFetch(url.toString(), token);
    for (const item of data.items || []) {
      const vid = item.snippet.resourceId?.videoId;
      const title = item.snippet.title;
      if (vid && title !== "Deleted video" && title !== "Private video") videoIds.push({ videoId: vid, title });
    }
    if (onProgress) onProgress(videoIds.length, maxVideos);
    pageToken = data.nextPageToken || null;
    if (maxVideos && videoIds.length >= maxVideos) break;
  } while (pageToken);
  return maxVideos ? videoIds.slice(0, maxVideos) : videoIds;
}

async function fetchUnansweredComments(token, videoId, videoTitle, channelId) {
  const unanswered = [];
  try {
    const url = new URL("https://www.googleapis.com/youtube/v3/commentThreads");
    url.searchParams.set("part", "snippet,replies");
    url.searchParams.set("videoId", videoId);
    url.searchParams.set("maxResults", "100");
    url.searchParams.set("order", "relevance");
    const data = await ytFetch(url.toString(), token);
    for (const item of data.items || []) {
      const top = item.snippet.topLevelComment.snippet;
      const replies = item.replies?.comments || [];
      const ownerReplied = replies.some(r => r.snippet.authorChannelId?.value === channelId);
      const isOwnComment = top.authorChannelId?.value === channelId;
      if (ownerReplied || isOwnComment) continue;
      const authorName = top.authorDisplayName || "Viewer";
      const initials = authorName.split(" ").map(w => w[0]).join("").slice(0, 2).toUpperCase() || "?";
      unanswered.push({
        id: item.id, topCommentId: item.snippet.topLevelComment.id,
        author: authorName, avatar: initials,
        text: top.textDisplay.replace(/<[^>]+>/g, "").replace(/&#39;/g,"'").replace(/&amp;/g,"&").replace(/&quot;/g,'"'),
        videoTitle, videoId,
        timestamp: new Date(top.publishedAt).toLocaleDateString(),
        likeCount: top.likeCount || 0, platform: "YouTube"
      });
    }
  } catch(e) {}
  return unanswered;
}

async function postReplyToYouTube(token, parentId, replyText) {
  return ytFetch("https://www.googleapis.com/youtube/v3/comments?part=snippet", token, {
    method: "POST",
    body: JSON.stringify({ snippet: { parentId, textOriginal: replyText } })
  });
}

async function generateReply(comment, apiKey) {
  const prompt = `${BRAND_VOICE}\n\nVIDEO: "${comment.videoTitle}"\nCOMMENTER: ${comment.author}\nCOMMENT: "${comment.text}"`;
  const response = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json", "x-api-key": apiKey, "anthropic-version": "2023-06-01", "anthropic-dangerous-direct-browser-access": "true" },
    body: JSON.stringify({ model: "claude-sonnet-4-20250514", max_tokens: 1000, messages: [{ role: "user", content: prompt }] })
  });
  const data = await response.json();
  if (data.error) throw new Error(data.error.message);
  const text = data.content?.[0]?.text || "";
  const categoryMatch = text.match(/CATEGORY:\s*(\w+)/);
  const replyMatch = text.match(/REPLY:\s*([\s\S]+)/);
  return { category: categoryMatch?.[1]?.trim() || "UNKNOWN", reply: replyMatch?.[1]?.trim() || text.trim() };
}

function App() {
  const [clientIdInput, setClientIdInput] = useState(() => localStorage.getItem("yt_client_id") || "");
  const [apiKey, setApiKey] = useState(() => localStorage.getItem("anthropic_api_key") || "");
  const [apiKeyInput, setApiKeyInput] = useState(() => localStorage.getItem("anthropic_api_key") || "");
  const [token, setToken] = useState(null);
  const [tokenExpiry, setTokenExpiry] = useState(null);
  const [channel, setChannel] = useState(null);
  const [scanMode, setScanMode] = useState("recent");
  const [scanning, setScanning] = useState(false);
  const [scanProgress, setScanProgress] = useState({ current:0, total:0, phase:"" });
  const abortRef = useRef(false);
  const [comments, setComments] = useState([]);
  const [generated, setGenerated] = useState({});
  const [approved, setApproved] = useState({});
  const [posted, setPosted] = useState({});
  const [loading, setLoading] = useState({});
  const [activeTab, setActiveTab] = useState("queue");
  const [editingId, setEditingId] = useState(null);
  const [editText, setEditText] = useState("");
  const [generating, setGenerating] = useState(false);
  const [toast, setToast] = useState(null);
  const [fetchError, setFetchError] = useState(null);

  const showToast = (msg, type="success") => { setToast({msg,type}); setTimeout(()=>setToast(null),4000); };

  useEffect(() => {
    const parsed = parseTokenFromHash();
    if (parsed) {
      setToken(parsed.token);
      setTokenExpiry(Date.now() + parsed.expiresIn * 1000);
      window.history.replaceState({}, document.title, window.location.pathname);
    }
  }, []);

  useEffect(() => {
    if (!token) return;
    fetchChannelInfo(token).then(ch => setChannel(ch)).catch(e => showToast("Could not load channel: " + e.message, "error"));
  }, [token]);

  const runScan = async () => {
    if (!token || !channel) return;
    abortRef.current = false;
    setScanning(true); setFetchError(null); setComments([]); setGenerated({}); setApproved({}); setPosted({});
    try {
      const maxVideos = scanMode === "recent" ? 20 : null;
      setScanProgress({ current:0, total:0, phase:`Loading video list...` });
      const videos = await fetchVideoIds(token, channel.uploadsPlaylistId, maxVideos, (loaded, total) => {
        setScanProgress({ current:loaded, total:total||channel.videoCount, phase:`Loading videos... ${loaded} found` });
      });
      if (abortRef.current) { setScanning(false); return; }
      setScanProgress({ current:0, total:videos.length, phase:`Scanning ${videos.length} videos...` });
      const allComments = [];
      for (let i=0; i<videos.length; i++) {
        if (abortRef.current) break;
        const {videoId, title} = videos[i];
        setScanProgress({ current:i+1, total:videos.length, phase:`Scanning: "${title.slice(0,40)}..."` });
        const vComments = await fetchUnansweredComments(token, videoId, title, channel.id);
        allComments.push(...vComments);
      }
      allComments.sort((a,b) => b.likeCount - a.likeCount);
      setComments(allComments);
      setScanProgress({ current:0, total:0, phase:"" });
      showToast(`${allComments.length} unanswered comments found across ${videos.length} videos`);
    } catch(e) {
      setFetchError(e.message);
      showToast("Scan error: " + e.message, "error");
    }
    setScanning(false);
  };

  useEffect(() => { if (channel) runScan(); }, [channel]);

  const generateAll = async () => {
    const pending = comments.filter(c => !generated[c.id] && !posted[c.id]);
    if (!pending.length) return;
    setGenerating(true);
    for (const comment of pending) {
      if (abortRef.current) break;
      setLoading(p => ({...p,[comment.id]:"generating"}));
      try { const result = await generateReply(comment, apiKey); setGenerated(p => ({...p,[comment.id]:result})); }
      catch { setGenerated(p => ({...p,[comment.id]:{category:"UNKNOWN",reply:"Error — regenerate."}})); }
      setLoading(p => ({...p,[comment.id]:false}));
    }
    setGenerating(false);
    showToast("All replies generated — review and approve below");
  };

  const generateOne = async (comment) => {
    setLoading(p => ({...p,[comment.id]:"generating"}));
    try { const result = await generateReply(comment, apiKey); setGenerated(p => ({...p,[comment.id]:result})); }
    catch { setGenerated(p => ({...p,[comment.id]:{category:"UNKNOWN",reply:"Error — try again."}})); }
    setLoading(p => ({...p,[comment.id]:false}));
  };

  const postReply = async (comment) => {
    const gen = generated[comment.id];
    if (!gen) return;
    setLoading(p => ({...p,[comment.id]:"posting"}));
    try {
      await postReplyToYouTube(token, comment.topCommentId, gen.reply);
      setPosted(p => ({...p,[comment.id]:true}));
      showToast(`✓ Reply posted to ${comment.author}`);
    } catch(e) { showToast("Post failed: " + e.message, "error"); }
    setLoading(p => ({...p,[comment.id]:false}));
  };

  const postAllApproved = async () => {
    const toPost = comments.filter(c => approved[c.id] && !posted[c.id]);
    for (const c of toPost) await postReply(c);
  };

  const pendingGen  = comments.filter(c => !generated[c.id] && !posted[c.id]).length;
  const needsReview = comments.filter(c => generated[c.id] && !approved[c.id] && !posted[c.id]).length;
  const readyPost   = comments.filter(c => approved[c.id] && !posted[c.id]).length;
  const postedCount = comments.filter(c => posted[c.id]).length;
  const queueList   = comments.filter(c => !posted[c.id]);
  const postedList  = comments.filter(c => posted[c.id]);
  const tokenValid  = token && tokenExpiry && Date.now() < tokenExpiry;

  if (!tokenValid) {
    return (
      <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
        <div style={{maxWidth:520,width:"100%"}}>
          <div style={{textAlign:"center",marginBottom:32}}>
            <div style={{width:54,height:54,background:"linear-gradient(135deg,#C9973A,#daa840)",borderRadius:14,display:"flex",alignItems:"center",justifyContent:"center",fontSize:26,margin:"0 auto 14px"}}>🎓</div>
            <h1 style={{fontFamily:"'Playfair Display',serif",fontSize:22}}>PrincipalED Comment Studio</h1>
            <p style={{color:"#555",fontSize:13,marginTop:6}}>Full-channel YouTube engagement, powered by Claude AI</p>
          </div>
          <div style={{background:"#141720",border:"1px solid #23263a",borderRadius:16,padding:26}}>
            <label style={{fontSize:12,fontWeight:600,color:"#666",display:"block",marginBottom:8,letterSpacing:".5px"}}>YOUTUBE OAUTH CLIENT ID</label>
            <input className="input" placeholder="Paste your OAuth 2.0 Client ID" value={clientIdInput} onChange={e=>setClientIdInput(e.target.value)} />
            <p style={{fontSize:11,color:"#3a3d4a",marginTop:6,lineHeight:1.6}}>
              From <strong style={{color:"#555"}}>console.cloud.google.com</strong> → Credentials → OAuth 2.0 Client ID (Web application).
            </p>
            <label style={{fontSize:12,fontWeight:600,color:"#666",display:"block",marginBottom:8,marginTop:18,letterSpacing:".5px"}}>ANTHROPIC API KEY</label>
            <input className="input" type="password" placeholder="sk-ant-..." value={apiKeyInput} onChange={e=>setApiKeyInput(e.target.value)} />
            <p style={{fontSize:11,color:"#3a3d4a",marginTop:6,lineHeight:1.6}}>
              From <strong style={{color:"#555"}}>console.anthropic.com</strong> → Get API key. Stored locally in your browser only.
            </p>
            <button className="btn btn-gold" style={{width:"100%",justifyContent:"center",padding:"12px 0",fontSize:14,marginTop:16}}
              disabled={!clientIdInput.trim() || !apiKeyInput.trim()}
              onClick={()=>{ 
                localStorage.setItem("yt_client_id",clientIdInput.trim()); 
                localStorage.setItem("anthropic_api_key",apiKeyInput.trim());
                setApiKey(apiKeyInput.trim());
                window.location.href=buildAuthUrl(clientIdInput.trim()); 
              }}>
              Connect YouTube Account →
            </button>
          </div>
          {localStorage.getItem("yt_client_id") && (
            <div style={{marginTop:14,textAlign:"center"}}>
              <button className="btn btn-ghost" style={{fontSize:12}} onClick={()=>window.location.href=buildAuthUrl(localStorage.getItem("yt_client_id"))}>
                ↺ Reconnect with saved Client ID
              </button>
            </div>
          )}
        </div>
      </div>
    );
  }

  return (
    <div style={{minHeight:"100vh"}}>
      <div style={{background:"#141720",borderBottom:"1px solid #23263a",padding:"0 28px"}}>
        <div style={{maxWidth:960,margin:"0 auto"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",paddingTop:16,paddingBottom:14}}>
            <div style={{display:"flex",alignItems:"center",gap:12}}>
              <div style={{width:36,height:36,background:"linear-gradient(135deg,#C9973A,#daa840)",borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>🎓</div>
              <div>
                <h1 style={{fontFamily:"'Playfair Display',serif",fontSize:18,lineHeight:1.1}}>PrincipalED Comment Studio</h1>
                {channel && <p style={{fontSize:11,color:"#444",marginTop:2}}>Connected: <span style={{color:"#C9973A"}}>{channel.title}</span> · <span style={{color:"#555"}}>{channel.videoCount} videos</span></p>}
              </div>
            </div>
            <div style={{display:"flex",gap:8,alignItems:"center"}}>
              {!scanning && <button className="btn btn-gold" onClick={generateAll} disabled={generating||pendingGen===0}>
                {generating ? <><span className="spinner"/> Generating...</> : `✦ Generate All (${pendingGen})`}
              </button>}
              {scanning && <button className="btn btn-red" onClick={()=>{abortRef.current=true;}} style={{fontSize:12}}>✕ Stop</button>}
            </div>
          </div>

          <div style={{display:"flex",gap:10,marginBottom:16}}>
            {[{key:"recent",icon:"⚡",title:"Daily Scan",desc:"Last 20 videos · Run daily",quota:"~20 units"},
              {key:"full",icon:"🔍",title:"Full Channel Scan",desc:`All ${channel?.videoCount||"~150"} videos · Run weekly`,quota:`~${channel?.videoCount||150} units`}
            ].map(mode => (
              <div key={mode.key} className={`mode-card ${scanMode===mode.key?"active":""}`} style={{flex:1}} onClick={()=>setScanMode(mode.key)}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:6}}>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <span style={{fontSize:16}}>{mode.icon}</span>
                    <span style={{fontWeight:600,fontSize:14,color:scanMode===mode.key?"#C9973A":"#bbb"}}>{mode.title}</span>
                  </div>
                  <span style={{fontSize:10,color:"#444",background:"#0b0d14",padding:"2px 8px",borderRadius:20,border:"1px solid #23263a"}}>{mode.quota}</span>
                </div>
                <p style={{fontSize:12,color:"#555",lineHeight:1.4}}>{mode.desc}</p>
              </div>
            ))}
            <button className="btn btn-scan" style={{alignSelf:"stretch",padding:"0 20px",fontSize:13}} onClick={runScan} disabled={scanning}>
              {scanning ? <><span className="spinner"/> Scanning...</> : "▶ Run Scan"}
            </button>
          </div>

          {scanning && scanProgress.total > 0 && (
            <div style={{marginBottom:16}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                <span className="pulse" style={{fontSize:12,color:"#C9973A"}}>{scanProgress.phase}</span>
                <span style={{fontSize:12,color:"#444"}}>{scanProgress.current}/{scanProgress.total}</span>
              </div>
              <div className="progress-bar-track">
                <div className="progress-bar-fill" style={{width:scanProgress.total>0?`${Math.round(scanProgress.current/scanProgress.total*100)}%`:"0%"}}/>
              </div>
            </div>
          )}
          {scanning && scanProgress.total===0 && (
            <div style={{marginBottom:16,display:"flex",alignItems:"center",gap:8,color:"#C9973A",fontSize:12}}>
              <span className="spinner"/><span className="pulse">{scanProgress.phase||"Initializing..."}</span>
            </div>
          )}

          <div style={{display:"flex",gap:10,paddingBottom:16}}>
            {[{label:"Needs Reply",value:pendingGen,color:"#C9973A"},{label:"Needs Review",value:needsReview,color:"#2D6FAB"},
              {label:"Ready to Post",value:readyPost,color:"#2d6b3f"},{label:"Posted",value:postedCount,color:"#333"},
              {label:"Total Found",value:comments.length,color:"#555"}
            ].map(s => (
              <div key={s.label} style={{background:"#0f1117",border:"1px solid #1a1d27",borderRadius:10,padding:"12px 16px",flex:1}}>
                <div style={{fontSize:22,fontWeight:700,color:s.color,lineHeight:1}}>{s.value}</div>
                <div style={{fontSize:11,color:"#3a3d4a",marginTop:4,fontWeight:500}}>{s.label}</div>
              </div>
            ))}
          </div>

          <div style={{display:"flex",borderBottom:"1px solid #23263a",marginBottom:-1}}>
            <button className={`tab ${activeTab==="queue"?"active":""}`} onClick={()=>setActiveTab("queue")}>Queue ({queueList.length})</button>
            <button className={`tab ${activeTab==="posted"?"active":""}`} onClick={()=>setActiveTab("posted")}>Posted ({postedList.length})</button>
          </div>
        </div>
      </div>

      <div style={{maxWidth:960,margin:"0 auto",padding:"22px 28px"}}>
        {readyPost>0 && activeTab==="queue" && (
          <div style={{background:"#111c16",border:"1px solid #2d6b3f",borderRadius:12,padding:"14px 18px",marginBottom:16,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
            <div>
              <div style={{fontWeight:600,color:"#4ade80",fontSize:14}}>{readyPost} {readyPost===1?"reply":"replies"} approved and ready</div>
              <div style={{fontSize:12,color:"#3a4a3a",marginTop:2}}>Post all at once or individually below</div>
            </div>
            <button className="btn btn-green" onClick={postAllApproved}>▶ Post All Approved</button>
          </div>
        )}

        {fetchError && <div style={{background:"#1a0808",border:"1px solid #7a2020",borderRadius:10,padding:"12px 16px",marginBottom:14,fontSize:13,color:"#f87171"}}>⚠ {fetchError}</div>}

        {activeTab==="queue" && !scanning && queueList.length===0 && (
          <div style={{textAlign:"center",padding:"60px 0",color:"#333"}}>
            <div style={{fontSize:40,marginBottom:10}}>✓</div>
            <div style={{fontSize:15,fontWeight:500,color:"#555"}}>{comments.length===0?"Run a scan to find unanswered comments":"All caught up!"}</div>
          </div>
        )}

        {activeTab==="queue" && queueList.map(comment => {
          const gen=generated[comment.id], isApproved=approved[comment.id], isLoading=loading[comment.id], isEditing=editingId===comment.id;
          const catInfo=gen?(CAT[gen.category]||CAT.UNKNOWN):null;
          return (
            <div key={comment.id} className={`card ${isApproved?"approved":""}`}>
              <div style={{display:"flex",gap:11,alignItems:"flex-start"}}>
                <div className="avatar">{comment.avatar}</div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:"flex",alignItems:"center",gap:7,flexWrap:"wrap"}}>
                    <span style={{fontWeight:600,fontSize:14}}>{comment.author}</span>
                    <span style={{fontSize:11,color:"#2a2d3a"}}>{comment.timestamp}</span>
                    {catInfo && <span className="badge" style={{background:catInfo.bg,color:catInfo.text,border:`1px solid ${catInfo.border}`}}>{catInfo.label}</span>}
                    {isApproved && <span className="badge" style={{background:"#1a3a25",color:"#4ade80",border:"1px solid #2d6b3f"}}>✓ Approved</span>}
                  </div>
                  <div style={{fontSize:11,color:"#2a2d3a",marginTop:2,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>on "{comment.videoTitle}" · ♥ {comment.likeCount}</div>
                </div>
              </div>
              <div style={{marginTop:10,marginLeft:47,fontSize:14,lineHeight:1.65,color:"#888",fontStyle:"italic"}}>"{comment.text}"</div>
              {isLoading==="generating" && (
                <div style={{marginTop:12,marginLeft:47,display:"flex",alignItems:"center",gap:8,color:"#C9973A"}}>
                  <span className="spinner"/><span className="pulse" style={{fontSize:13}}>Generating reply in your voice...</span>
                </div>
              )}
              {gen && isLoading!=="generating" && (
                <div style={{marginLeft:47,marginTop:2}}>
                  {isEditing ? (
                    <>
                      <textarea className="reply-edit" value={editText} onChange={e=>setEditText(e.target.value)} rows={4}/>
                      <div style={{display:"flex",gap:8,marginTop:10}}>
                        <button className="btn btn-gold" onClick={()=>{setGenerated(p=>({...p,[comment.id]:{...p[comment.id],reply:editText}}));setEditingId(null);showToast("Edit saved");}}>Save</button>
                        <button className="btn btn-ghost" onClick={()=>setEditingId(null)}>Cancel</button>
                      </div>
                    </>
                  ) : (
                    <>
                      <div className="reply-box">
                        <div style={{fontSize:10,color:"#C9973A",fontWeight:700,marginBottom:7,letterSpacing:"1px"}}>DR. AMERSON'S REPLY</div>
                        {gen.reply}
                      </div>
                      <div style={{display:"flex",gap:8,marginTop:10,flexWrap:"wrap"}}>
                        {!isApproved ? (
                          <>
                            <button className="btn btn-green" onClick={()=>{setApproved(p=>({...p,[comment.id]:true}));showToast("Approved ✓");}}>✓ Approve</button>
                            <button className="btn btn-ghost" onClick={()=>{setEditingId(comment.id);setEditText(gen.reply);}}>✎ Edit</button>
                            <button className="btn btn-ghost" onClick={()=>generateOne(comment)}>↺ Regen</button>
                          </>
                        ) : (
                          <>
                            <button className="btn btn-navy" onClick={()=>postReply(comment)} disabled={isLoading==="posting"}>
                              {isLoading==="posting"?<><span className="spinner"/> Posting...</>:"▶ Post to YouTube"}
                            </button>
                            <button className="btn btn-ghost" onClick={()=>{setEditingId(comment.id);setEditText(gen.reply);}}>✎ Edit</button>
                            <button className="btn btn-red" onClick={()=>setApproved(p=>({...p,[comment.id]:false}))}>Unapprove</button>
                          </>
                        )}
                      </div>
                    </>
                  )}
                </div>
              )}
              {!gen && isLoading!=="generating" && (
                <div style={{marginLeft:47,marginTop:12}}>
                  <button className="btn btn-navy" onClick={()=>generateOne(comment)}>✦ Generate Reply</button>
                </div>
              )}
            </div>
          );
        })}

        {activeTab==="posted" && postedList.length===0 && (
          <div style={{textAlign:"center",padding:"60px 0",color:"#333"}}>
            <div style={{fontSize:36,marginBottom:10}}>📬</div>
            <div style={{fontSize:14,color:"#555"}}>No replies posted yet this session</div>
          </div>
        )}

        {activeTab==="posted" && postedList.map(comment => {
          const gen=generated[comment.id], catInfo=gen?(CAT[gen.category]||CAT.UNKNOWN):null;
          return (
            <div key={comment.id} className="card posted">
              <div style={{display:"flex",gap:11}}>
                <div className="avatar">{comment.avatar}</div>
                <div>
                  <div style={{display:"flex",gap:7,flexWrap:"wrap",alignItems:"center"}}>
                    <span style={{fontWeight:600,fontSize:14}}>{comment.author}</span>
                    {catInfo && <span className="badge" style={{background:catInfo.bg,color:catInfo.text,border:`1px solid ${catInfo.border}`}}>{catInfo.label}</span>}
                    <span className="badge" style={{background:"#0f1420",color:"#2D6FAB",border:"1px solid #1B3A6B"}}>✓ Posted</span>
                  </div>
                  <div style={{fontSize:11,color:"#2a2d3a",marginTop:2}}>on "{comment.videoTitle}"</div>
                </div>
              </div>
              <div style={{marginLeft:47,marginTop:10,fontSize:13,color:"#555",fontStyle:"italic"}}>"{comment.text}"</div>
              {gen && <div style={{marginLeft:47,marginTop:8,fontSize:13,color:"#3a3d4a",background:"#0f1117",borderRadius:8,padding:10,lineHeight:1.6}}>{gen.reply}</div>}
            </div>
          );
        })}
      </div>

      <div style={{textAlign:"center",padding:"14px 0 26px",fontSize:11,color:"#1e2030"}}>
        PrincipalED Leader Academy · Comment Studio · Powered by Claude AI ·{" "}
        <span style={{cursor:"pointer",textDecoration:"underline"}} onClick={()=>{localStorage.removeItem("yt_client_id");setToken(null);window.location.reload();}}>Disconnect</span>
      </div>

      {toast && <div className={`toast ${toast.type}`}>{toast.msg}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
